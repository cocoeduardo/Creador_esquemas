<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Esquemas - Centrado Automático</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&display=swap');

        :root {
            --retro-orange: #ff6600;
            --retro-orange-glow: rgba(255, 102, 0, 0.3);
            --retro-dark: #0d0d0d;
            --retro-bg: #151515;
            --terminal-border: 2px solid #2a2a2a;
            --postit-yellow: #fef08a;
            --postit-text: #1a1a1a;
        }

        body {
            background-color: var(--retro-bg);
            color: var(--retro-orange);
            font-family: 'IBM Plex Mono', monospace;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        * {
            font-family: 'IBM Plex Mono', monospace !important;
        }

        .terminal-window {
            border: var(--terminal-border);
            box-shadow: 0 0 20px var(--retro-orange-glow);
            background: var(--retro-dark);
        }

        .terminal-header {
            background: #2a2a2a;
            color: var(--retro-orange);
            padding: 6px 12px;
            font-size: 0.75rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--retro-orange);
        }

        #viewport {
            background: white;
            position: relative;
            overflow: hidden;
            flex: 1;
        }

        #schema-canvas {
            background: white;
            padding: 3000px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transform-origin: 0 0;
            transform: translate(0, 0) scale(1);
            transition: opacity 0.2s ease-in;
        }

        .tree-row {
            display: flex;
            align-items: center;
            position: relative;
            width: max-content;
            flex-direction: row;
        }

        .node {
            background: var(--postit-yellow);
            color: var(--postit-text);
            padding: 14px 20px;
            border-radius: 0;
            font-weight: 600;
            font-size: 0.85rem;
            min-width: 140px;
            max-width: 280px;
            flex-shrink: 0;
            text-align: center;
            box-shadow: 4px 4px 0px #000;
            position: relative;
            z-index: 10;
            border: 2px solid #000;
            white-space: normal;
            word-wrap: break-word;
            line-height: 1.3;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: grab;
            user-select: none;
        }

        .node:active {
            cursor: grabbing;
            box-shadow: 8px 8px 0px #000;
        }

        .children-group {
            display: flex;
            position: relative;
            width: max-content;
            flex-direction: column;
            gap: 24px;
            padding-left: 100px;
        }

        .connector-svg {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: visible;
        }

        .connector-path {
            fill: none;
            stroke: #000;
            stroke-width: 2;
        }

        .btn-retro {
            border: 1px solid var(--retro-orange);
            padding: 8px 16px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            font-weight: bold;
            font-size: 0.8rem;
        }

        .btn-retro:hover {
            background: var(--retro-orange);
            color: black;
            box-shadow: 0 0 15px var(--retro-orange);
        }

        #zoom-level {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.8);
            color: var(--retro-orange);
            padding: 4px 10px;
            font-size: 10px;
            z-index: 20;
            border: 1px solid var(--retro-orange);
        }

        .scanline {
            width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(255,102,0,0) 50%, rgba(255,102,0,0.01) 50%);
            background-size: 100% 4px;
            position: fixed; top: 0; left: 0; z-index: 100;
            pointer-events: none;
        }

        textarea {
            background: #000 !important;
            color: var(--retro-orange) !important;
            border: 1px solid var(--retro-orange) !important;
            padding: 10px;
        }
    </style>
</head>
<body class="p-4">
    <div class="scanline"></div>

    <header class="mb-4 flex justify-between items-end border-b border-orange-900 pb-2">
        <h1 class="text-2xl font-bold tracking-tighter">GENERADOR DE ESQUEMAS <span class="text-sm opacity-50 ml-2">v4.2.0</span></h1>
        <div id="status-msg" class="text-xs font-bold uppercase tracking-widest">SISTEMA: EN LÍNEA _</div>
    </header>

    <main class="flex-1 flex gap-4 overflow-hidden">
        
        <div class="flex-1 terminal-window flex flex-col relative overflow-hidden">
            <div class="terminal-header">
                <span>VIEWPORT_CENTRAL</span>
                <span>ARRASTRAR NODO: MOVER | ARRASTRAR FONDO: NAVEGAR</span>
            </div>
            <div id="viewport">
                <div id="zoom-level">ZOOM: 100%</div>
                <div id="schema-canvas"></div>
            </div>
        </div>

        <div class="w-1/3 max-w-md terminal-window flex flex-col">
            <div class="terminal-header">
                <span>BUFFER_CONTROL</span>
            </div>
            
            <div class="p-4 flex flex-col h-full gap-4 overflow-y-auto">
                <div class="flex flex-col gap-2 py-2">
                    <label class="text-[10px] font-bold">ACCESO DIRECTO:</label>
                    <button id="render-clipboard-btn" class="btn-retro w-full py-8 text-sm bg-orange-900/20">
                        PEGAR Y CENTRAR AUTOMÁTICAMENTE
                    </button>
                    <p class="text-[9px] opacity-60 text-center uppercase tracking-tighter">Acceso directo al portapapeles sin diálogos extra</p>
                </div>

                <div class="flex gap-2 border-t border-orange-950 pt-4">
                    <button id="reset-view-btn" class="btn-retro flex-1 text-xs w-full">CENTRAR VISTA</button>
                </div>

                <div class="flex flex-col mt-auto pt-4 border-t border-orange-950">
                    <label class="text-[10px] mb-1 font-bold">PROMPT PARA TU IA:</label>
                    <div class="relative">
                        <textarea id="prompt-text" readonly class="w-full text-[10px] h-32 opacity-70" style="color: #ffaa66 !important;">Eres un sistema especializado en análisis académico y estructuración de contenidos en formato jerárquico.

Tu tarea es analizar un documento PDF junto con un conjunto de imágenes extraídas de ese mismo documento y generar un esquema en formato JSON con estructura de árbol.

Debes seguir estrictamente las instrucciones paso a paso. No improvises, no añadas información externa y no cambies el formato de salida.

---

## OBJETIVO

Transformar el contenido del PDF en un esquema jerárquico tipo árbol, identificando únicamente los conceptos principales y sus relaciones.

El resultado debe ser SIEMPRE un JSON válido con esta estructura exacta:

{
  "titulo": "Concepto Raíz",
  "hijos": [
    {
      "titulo": "Subcategoría",
      "hijos": [
        { "titulo": "Detalle", "hijos": [] }
      ]
    }
  ]
}

---

## FASE 1: LECTURA Y FILTRADO

1. Lee completamente el PDF.
2. Analiza todas las imágenes proporcionadas.
3. Identifica la estructura por secciones o puntos del documento.

IMPORTANTE:

* Ignora completamente:

  * Introducción
  * Ejemplos prácticos
  * Bibliografía
  * Tests o preguntas finales

Estos elementos NO deben aparecer en el esquema.

---

---

---

## FASE 2: PROCESAMIENTO POR SECCIONES

Para cada sección o punto del PDF:

1. Analiza en profundidad TODO el contenido textual de la sección.

2. Determina si alguna imagen está relacionada con esa sección:

   * Si SÍ está relacionada → intégrala como contexto para comprender mejor el contenido.
   * Si NO → ignora las imágenes.

3. Identifica los elementos principales de la sección siguiendo estas reglas estrictas:

   * Debes detectar TODOS los conceptos relevantes que se desarrollan en la sección.
   * No debe quedarse fuera ningún elemento importante.
   * El número de elementos principales es variable (puede ser 1, 2, 3, 4 o más).

   CRITERIO CLAVE:

   * Incluye cualquier concepto que forme parte del contenido explicado.
   * Excluye únicamente:

     * Detalles secundarios
     * Aclaraciones menores
     * Comentarios marginales
     * Información mencionada de pasada sin desarrollo

   IMPORTANTE:

   * Si un concepto se explica o desarrolla mínimamente → DEBE incluirse.
   * Si un concepto solo se menciona sin explicación → NO incluirlo.

4. Verificación obligatoria antes de continuar:

   * Asegúrate de que todos los conceptos relevantes de la sección están representados.
   * Confirma que no has omitido ningún elemento importante.
   * Confirma que no has incluido información irrelevante.

Solo cuando esta verificación sea correcta, continúa a la siguiente fase.


---

## FASE 3: DESARROLLO JERÁRQUICO

Para cada elemento principal detectado:

CASO A:
Si el concepto requiere subdivisión:

* Divide en subelementos clave.
* Para cada subelemento:

  * Genera una explicación breve (1 frase clara y concisa).

Estructura:
Concepto principal
→ Subelemento
→ Explicación breve

CASO B:
Si NO requiere subdivisión:

* Genera directamente una explicación breve del concepto.

Estructura:
Concepto principal
→ Explicación breve

IMPORTANTE:

* Las explicaciones deben ser:

  * Muy concisas
  * Claras
  * Sin ejemplos
  * Sin relleno

---

## FASE 4: CONSTRUCCIÓN DEL JSON

1. El nodo raíz ("titulo") debe ser el título del tema.
2. Cada sección del PDF será un nodo hijo del raíz.
3. Cada concepto será hijo de su sección.
4. Cada subelemento o explicación será hijo del concepto.

REGLAS CRÍTICAS:

* TODOS los nodos deben tener:

  * "titulo"
  * "hijos"
* Si no hay hijos → "hijos": []
* No añadas texto fuera del JSON
* No expliques nada
* No uses comentarios
* No uses markdown
* SOLO devuelve el JSON

---

## REGLAS DE CALIDAD

* Mantén coherencia en todos los niveles
* Usa lenguaje claro y directo
* No repitas información
* No inventes contenido
* No incluyas ejemplos del PDF
* Prioriza comprensión visual (estructura limpia)
* Que no aparezca la Introducción
* Que no aparezcan Ejemplos prácticos
* Que no aparezca la Bibliografía
* Que no aparezcan los Tests o preguntas finales

---

## SALIDA FINAL

Devuelve únicamente el JSON completo marcado como código en markdown, válido y bien estructurado.

Nada más.</textarea>
                        <button id="copy-prompt-btn" class="absolute bottom-2 right-2 text-[10px] bg-orange-950 px-2 py-1 border border-orange-500">COPIAR</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const viewport = document.getElementById('viewport');
        const canvas = document.getElementById('schema-canvas');
        const renderBtn = document.getElementById('render-clipboard-btn');
        const statusMsg = document.getElementById('status-msg');
        const zoomLabel = document.getElementById('zoom-level');

        let scale = 1.0;
        let translateX = 0;
        let translateY = 0;
        let currentData = null;
        
        let isDraggingViewport = false;
        let isDraggingNode = false;
        let activeNode = null;
        let startX, startY, initialNodeX = 0, initialNodeY = 0;

        function updateTransform() {
            canvas.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
            zoomLabel.textContent = `ZOOM: ${Math.round(scale * 100)}%`;
        }

        async function executeRender(data) {
            canvas.style.opacity = "0";
            canvas.innerHTML = '';
            
            const wrapper = document.createElement('div');
            wrapper.style.position = 'relative';
            wrapper.style.width = 'max-content';
            wrapper.appendChild(renderTree(data));
            canvas.appendChild(wrapper);
            
            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    drawConnectors();
                    centerView();
                    canvas.style.opacity = "1";
                });
            });
        }

        function renderTree(data) {
            const root = document.createElement('div');
            root.className = 'tree-row';
            const node = document.createElement('div');
            node.className = 'node';
            node.textContent = data.titulo;
            node.dataset.offsetX = 0; 
            node.dataset.offsetY = 0;
            root.appendChild(node);

            if (data.hijos && data.hijos.length > 0) {
                const group = document.createElement('div');
                group.className = 'children-group';
                const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
                svg.className.baseVal = "connector-svg";
                group.appendChild(svg);
                data.hijos.forEach(h => group.appendChild(renderTree(h)));
                root.appendChild(group);
            }
            return root;
        }

        function drawConnectors() {
            document.querySelectorAll('.children-group').forEach(group => {
                const svg = group.querySelector('svg');
                svg.innerHTML = '';
                const parent = group.parentElement.querySelector('.node');
                const pX = parseFloat(parent.dataset.offsetX || 0);
                const pY = parseFloat(parent.dataset.offsetY || 0);

                Array.from(group.children).filter(el => el.classList.contains('tree-row')).forEach(child => {
                    const cNode = child.querySelector('.node');
                    const cX = parseFloat(cNode.dataset.offsetX || 0);
                    const cY = parseFloat(cNode.dataset.offsetY || 0);
                    
                    let sX = pX; 
                    let sY = parent.offsetTop + (parent.offsetHeight / 2) + pY;
                    let eX = 100 + cX; 
                    let eY = child.offsetTop + cNode.offsetTop + (cNode.offsetHeight / 2) + cY;
                    
                    const midX = (sX + eX) / 2;
                    const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                    path.setAttribute("class", "connector-path");
                    path.setAttribute("d", `M ${sX} ${sY} C ${midX} ${sY}, ${midX} ${eY}, ${eX} ${eY}`);
                    svg.appendChild(path);
                });
            });
        }

        renderBtn.onclick = async () => {
            try {
                const text = await navigator.clipboard.readText();
                const cleanText = text.replace(/```json|```/g, "").trim();
                currentData = JSON.parse(cleanText);
                await executeRender(currentData);
                statusMsg.textContent = "SISTEMA: ACTUALIZADO Y RE-CENTRADO";
            } catch (err) {
                statusMsg.textContent = "ERROR: OTORGA PERMISO DE PEGADO EN EL NAVEGADOR";
                console.error(err);
            }
        };

        viewport.onmousedown = (e) => {
            if (e.target.classList.contains('node')) {
                isDraggingNode = true; activeNode = e.target;
                initialNodeX = parseFloat(activeNode.dataset.offsetX || 0);
                initialNodeY = parseFloat(activeNode.dataset.offsetY || 0);
                startX = e.clientX; startY = e.clientY;
                e.stopPropagation();
            } else {
                isDraggingViewport = true; startX = e.clientX; startY = e.clientY;
            }
        };

        window.onmousemove = (e) => {
            if (isDraggingNode && activeNode) {
                const dx = (e.clientX - startX) / scale; 
                const dy = (e.clientY - startY) / scale;
                const nX = initialNodeX + dx; 
                const nY = initialNodeY + dy;
                activeNode.style.transform = `translate(${nX}px, ${nY}px)`;
                activeNode.dataset.offsetX = nX; 
                activeNode.dataset.offsetY = nY;
                drawConnectors();
            } else if (isDraggingViewport) {
                translateX += e.clientX - startX; 
                translateY += e.clientY - startY;
                startX = e.clientX; startY = e.clientY;
                updateTransform();
            }
        };

        window.onmouseup = () => { isDraggingViewport = false; isDraggingNode = false; };

        viewport.onwheel = (e) => {
            e.preventDefault();
            const delta = Math.exp(-e.deltaY * 0.001);
            const nextScale = Math.min(Math.max(scale * delta, 0.1), 5);
            const rect = viewport.getBoundingClientRect();
            translateX = (rect.width/2) - (rect.width/2 - translateX) * (nextScale / scale);
            translateY = (rect.height/2) - (rect.height/2 - translateY) * (nextScale / scale);
            scale = nextScale;
            updateTransform();
        };

        function centerView() {
            const vW = viewport.clientWidth, vH = viewport.clientHeight;
            const content = canvas.firstChild;
            if (!content) return;
            const cR = content.getBoundingClientRect();
            
            const contentWidth = cR.width / scale;
            const contentHeight = cR.height / scale;
            
            scale = Math.min((vW - 120) / contentWidth, (vH - 120) / contentHeight, 1.0);
            
            translateX = (vW / 2) - (3000 + contentWidth / 2) * scale;
            translateY = (vH / 2) - (3000 + contentHeight / 2) * scale;
            
            updateTransform();
        }

        document.getElementById('reset-view-btn').onclick = centerView;

        document.getElementById('copy-prompt-btn').onclick = () => {
            const el = document.getElementById('prompt-text');
            el.select();
            document.execCommand('copy');
            statusMsg.textContent = "SISTEMA: PROMPT COPIADO";
        };

        window.onload = () => {
            currentData = {"titulo": "Generador Listo", "hijos": [{"titulo": "Copia el JSON de tu IA", "hijos": []}, {"titulo": "Usa el botón superior", "hijos": []}]};
            executeRender(currentData);
        };
        window.onresize = centerView;
    </script>
</body>
</html>
